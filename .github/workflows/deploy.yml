name: Deploy to GitHub Pages

# בונה את האפליקציה ומפרסם אותה ל-GitHub Pages בכל דחיפה ל-main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# מבטל הרצה קודמת אם נדחף שינוי חדש לפני שהסתיימה.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # קוד ה-PIN למחיקת דוחות – נטען מ-Secret של המאגר (לא מאוחסן בקוד).
          VITE_DELETE_PIN: ${{ secrets.VITE_DELETE_PIN }}
      - uses: actions/configure-pages@v5
        with:
          # מפעיל את GitHub Pages (מקור: GitHub Actions) אוטומטית אם עדיין לא הופעל.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
